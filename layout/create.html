<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <link rel="stylesheet" href="/styles/style.css">

    <!--Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!--sidebar (nav bar)-->
        <nav class="sidebar">
            <div class="nav-header">
                <img src="/icons/pin_icon.svg" alt="Pin Icon" class="nav-icon pin-icon">
                <span class="nav-title">
                    Eventure <span class="nav-subtitle">Create</span>
                </span>
            </div>

            <!--nav tabs-->
            <hr class="menu-divider">
            <span class="menu-title">Menu</span>
            <a href="/layout/home.html"><img src="/icons/home_icon.svg" class="nav-icon">Home</a>
            <a href="/layout/create.html" id="open-modal-btn"><img src="/icons/create_icon.svg" class="nav-icon">Create</a>
            <a href="/layout/transactions.html"><img src="/icons/transaction_icon.svg" class="nav-icon">Transactions</a>
            <a href="/layout/account.html"><img src="/icons/account_icon.svg" class="nav-icon">Account</a>
            <a href="/layout/about.html"><img src="/icons/about_icon.svg" class="nav-icon">About</a>
            <a href="/layout/login.html" class="logout">
                <img src="/icons/logout_icon.svg" class="nav-icon logout-icon">Logout
            </a>
        </nav>

        <!--create page-->
        <main class="create-wrapper">
            <h1 class="create-header">Create</h1>
            <hr class="divider">

            <!--form section (name,location,link,date,location,cost,desc,tags)-->
            <form class="create-form">
                <!--event name(required)-->
                <div class="form-group">
                    <label for="event-name">Event Name</label>
                    <input type="text" id="event-name" placeholder="Enter event name" required>
                </div>

                <!--link (optional)-->
                <div class="form-group">
                    <label for="event-link">Link</label>
                    <input type="url" id="event-link" placeholder="Insert link here" required>
                </div>


                <!--date(required)-->
                <div class="form-group">
                    <label for="event-date">Date</label>
                    <input type="date" id="event-date" required>
                </div>

                <!--location(required)-->
                <div class="form-group">
                    <label for="event-location">Location</label>
                    <input type="text" id="event-location" placeholder="Enter event location" required>
                </div>

                <!--cost to attend event(required)-->
                <div class="form-group">
                    <label for="event-cost">Cost to Attend</label>
                    <input type="number" id="event-cost" placeholder="Enter cost (e.g., 50.00 USD)" min="0" step="0.01" required>
                </div>

                <!--description-->
                <div class="form-group description-group">
                    <label for="event-description">Description</label>
                    <textarea id="event-description" rows="8" placeholder="Write a brief event description"></textarea>
                </div>

                <!--tags pre crafted -- for each event-->
                <div class="form-group">
                    <label for="event-tags">Tags</label>
                    <select id="event-tags" required>
                        <option value="" disabled selected>Select a tag</option>
                        <option value="workshop">Workshop</option>
                        <option value="conference">Academic</option>
                        <option value="meetup">Meetup</option>
                        <option value="networking">Networking</option>
                    </select>
                </div>

                <!--submit button-->
                <div class="form-group form-submit">
                    <button type="submit" class="create-btn">Create</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
