<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/style.css">

    <!--fonts for page -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <!--main dashboard container-->
    <div class="dashboard-container">
        <!--Left sidebar(headers, tabs for navigation)-->
        <nav class="sidebar">
            <div class="nav-header">
                <img src="/icons/pin_icon.svg" alt="Pin Icon" class="nav-icon pin-icon">
                <span class="nav-title">
                    Eventure <span class="nav-subtitle">dashboard</span>
                </span>
            </div>
            <hr class="menu-divider">
            <span class="nav-subtitle menu-title">Menu</span>
            <a href="#"><img src="/icons/home_icon.svg" alt="Home Icon" class="nav-icon">Home</a>
            <a href="#"><img src="/icons/create_icon.svg" alt="Create Icon" class="nav-icon">Create</a>
            <a href="#"><img src="/icons/transaction_icon.svg" alt="Transactions Icon" class="nav-icon">Transactions</a>
            <a href="#"><img src="/icons/account_icon.svg" alt="Account Icon" class="nav-icon">Account</a>
            <a href="#"><img src="/icons/about_icon.svg" alt="About Icon" class="nav-icon">About</a>
            <a href="#" class="logout">
                <img src="/icons/logout_icon.svg" alt="Logout Icon" class="nav-icon logout-icon">Logout
            </a>
        </nav>



        <!--Center content: icons + event boxes-->
        <div class="center-content">
            <!--event actions (icons)-->
            <div class="event-actions">
                <!--create event icon-->
                <div class="action-item" id="create-icon">
                    <img src="/icons/create_icon.svg" alt="Create Icon">
                </div>
            

                <!--search Bar to filter for events-->
                <div class="search-wrapper">
                    <input type="text" placeholder="Search..." />
                    <button class="search-btn">
                        <img src="/icons/search_icon.svg" alt="Search Icon">
                    </button>
                </div>
            
                <!--attending events icon(star, top right)-->
                <div class="action-item" id="attending-icon">
                    <img src="/icons/star_icon.svg" alt="Attending Events Icon">
                </div>
            </div>

            
            <!--event boxes (will dynamically populate with info when connected to DB)-->
            <main class="event-container">
                <div class="event-box">Event 1</div>
                <div class="event-box">Event 2</div>
                <div class="event-box">Event 3</div>
                <div class="event-box">Event 4</div>
                <div class="event-box">Event 5</div>
                <div class="event-box">Event 6</div>
                <div class="event-box">Event 7</div>
                <div class="event-box">Event 8</div>
                <div class="event-box">Event 9</div>
            </main>
        </div>



        <!--event details(right hand side)-->
        <aside class="preview-panel">
            <h2>Event Details</h2>
            <p>Select an event to view details here.</p>
        </aside>
    </div>
<!--link to javascript file-->
    <script src="/script.js"></script>
</body>
</html>
